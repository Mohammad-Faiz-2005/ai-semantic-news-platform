<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>SemanticNews — AI-Powered News Search</title>
    <meta
      name="description"
      content="AI-powered semantic news search and personalised recommendations using Sentence-BERT and FAISS vector indexing."
    />
    <meta name="author" content="SemanticNews" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SemanticNews — AI-Powered News Search" />
    <meta
      property="og:description"
      content="Find news articles by meaning, not just keywords. Powered by Sentence-BERT and FAISS."
    />

    <!-- Favicon (inline SVG as data URI) -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text y='.9em' font-size='65' x='50%' text-anchor='middle' fill='white' font-family='system-ui'>SN</text></svg>"
    />

    <!-- Theme colour for mobile browsers -->
    <meta name="theme-color" content="#2563eb" />

    <!-- Preconnect to Google Fonts (if you add fonts later) -->
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com" /> -->
  </head>

  <body>
    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Vite injects the module script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
